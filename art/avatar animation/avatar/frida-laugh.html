<!DOCTYPE html>
<!--
  Frida laugh animation — self-contained drop-in snippet.
  Copy the <style>, the .frida-tap markup, and the <script> into your app.
  Tap/click Frida -> she laughs (eyes close, mouth opens, bounce + "ha!" bubbles).
  Works with any framework: just toggle the "laughing" class for ~1s.
-->
<html lang="nl">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Frida laugh</title>
<style>
  body { margin: 0; min-height: 100vh; display: grid; place-items: center; background: #FDF8EE; font-family: sans-serif; }

  .frida-tap { position: relative; cursor: pointer; user-select: none; -webkit-tap-highlight-color: transparent; width: 260px; }
  .frida-tap .frida-fig { transform-origin: 50% 100%; }
  .frida-tap .laugh-face { opacity: 0; }
  .frida-tap .ha { position: absolute; font-family: 'Baloo 2', 'Arial Rounded MT Bold', sans-serif; font-weight: 800; color: #45232F; opacity: 0; pointer-events: none; }
  .frida-tap .ha1 { left: -6px;  top: 26px; font-size: 22px; }
  .frida-tap .ha2 { right: -14px; top: 14px; font-size: 27px; }
  .frida-tap .ha3 { right: -26px; top: 66px; font-size: 18px; }

  .frida-tap.laughing .normal-face { opacity: 0; }
  .frida-tap.laughing .laugh-face  { opacity: 1; }
  .frida-tap.laughing .frida-fig { animation: fridaLaugh 1s ease; }
  .frida-tap.laughing .ha { animation: fridaHa 1s ease-out forwards; }
  .frida-tap.laughing .ha2 { animation-delay: 0.18s; }
  .frida-tap.laughing .ha3 { animation-delay: 0.36s; }

  @keyframes fridaLaugh {
    0%   { transform: scale(1) rotate(0deg); }
    15%  { transform: scale(1.07, 0.9) rotate(-3deg); }
    35%  { transform: scale(0.95, 1.07) rotate(3deg) translateY(-9px); }
    55%  { transform: scale(1.05, 0.93) rotate(-2deg); }
    75%  { transform: scale(0.98, 1.03) rotate(1.5deg) translateY(-4px); }
    100% { transform: scale(1) rotate(0deg); }
  }
  @keyframes fridaHa {
    0%   { opacity: 0; transform: translateY(8px) scale(0.5) rotate(0deg); }
    25%  { opacity: 1; }
    100% { opacity: 0; transform: translateY(-30px) scale(1.2) rotate(10deg); }
  }
  @media (prefers-reduced-motion: reduce) {
    .frida-tap.laughing .frida-fig, .frida-tap.laughing .ha { animation: none; }
    .frida-tap.laughing .ha { opacity: 1; }
  }
</style>
</head>
<body>

<div class="frida-tap" id="frida" role="button" tabindex="0" aria-label="Frida — tik om te laten lachen">
  <span class="ha ha1">ha!</span>
  <span class="ha ha2">ha!</span>
  <span class="ha ha3">ha!</span>
  <div class="frida-fig">
    <svg viewBox="0 0 240 260" width="260">
      <path d="M120,118 C168,118 184,156 182,196 C180,234 156,250 120,250 C84,250 60,234 58,196 C56,156 72,118 120,118 Z" fill="#F5A03C"></path>
      <path d="M72,192 C66,206 68,224 78,234" stroke="#DD7E1F" stroke-width="5" stroke-linecap="round" fill="none"></path>
      <path d="M168,192 C174,206 172,224 162,234" stroke="#DD7E1F" stroke-width="5" stroke-linecap="round" fill="none"></path>
      <ellipse cx="120" cy="206" rx="30" ry="40" fill="#FFF1DB"></ellipse>
      <path d="M112,220 Q120,225 128,220" stroke="#EDD3AC" stroke-width="4" stroke-linecap="round" fill="none"></path>
      <path d="M108,233 Q120,239 132,233" stroke="#EDD3AC" stroke-width="4" stroke-linecap="round" fill="none"></path>
      <rect x="88" y="184" width="24" height="62" rx="12" fill="#F5A03C"></rect>
      <rect x="128" y="184" width="24" height="62" rx="12" fill="#F5A03C"></rect>
      <path d="M95,238 L95,245 M105,238 L105,245 M135,238 L135,245 M145,238 L145,245" stroke="#DD7E1F" stroke-width="3" stroke-linecap="round"></path>
      <ellipse cx="120" cy="90" rx="64" ry="56" fill="#F5A03C"></ellipse>
      <ellipse cx="153" cy="88" rx="22" ry="21" fill="#FFF1DB"></ellipse>
      <path d="M94,28 Q70,28 54,36 Q48,40 50,48 Q54,70 62,84 Q66,90 71,84 Q82,68 88,46 Q92,34 94,28 Z" fill="#DD7E1F"></path>
      <path d="M146,28 Q170,28 186,36 Q192,40 190,48 Q186,70 178,84 Q174,90 169,84 Q158,68 152,46 Q148,34 146,28 Z" fill="#DD7E1F"></path>
      <path d="M120,35 C107,35 101,48 100,64 C99,80 96,93 88,104 C99,114 141,114 152,104 C144,93 141,80 140,64 C139,48 133,35 120,35 Z" fill="#FFF1DB"></path>
      <path d="M120,42 Q123,49 129,54 Q123,59 120,66 Q117,59 111,54 Q117,49 120,42 Z" fill="#F5A03C"></path>
      <ellipse cx="88" cy="86" rx="20" ry="18" fill="#D9761C" opacity="0.5"></ellipse>
      <ellipse cx="120" cy="126" rx="40" ry="28" fill="#FFF1DB"></ellipse>
      <rect x="102" y="108" width="36" height="21" rx="10.5" fill="#45232F"></rect>
      <ellipse cx="112" cy="114" rx="3.5" ry="2.5" fill="#6E4657"></ellipse>
      <g class="normal-face">
        <ellipse cx="88" cy="88" rx="16" ry="18" fill="#FFF6E6"></ellipse>
        <rect x="81" y="80" width="15" height="21" rx="7.5" fill="#45232F"></rect>
        <path d="M71,86 Q88,79 105,86 L105,66 Q88,56 71,66 Z" fill="#E8912E"></path>
        <path d="M73,85 Q88,78 103,85" stroke="#C96C1B" stroke-width="4" stroke-linecap="round" fill="none"></path>
        <ellipse cx="152" cy="88" rx="16" ry="18" fill="#FFF6E6"></ellipse>
        <rect x="145" y="80" width="15" height="21" rx="7.5" fill="#45232F"></rect>
        <path d="M135,86 Q152,79 169,86 L169,66 Q152,56 135,66 Z" fill="#FFF1DB"></path>
        <path d="M137,85 Q152,78 167,85" stroke="#E4C193" stroke-width="4" stroke-linecap="round" fill="none"></path>
        <path d="M120,130 L120,137" stroke="#E4C193" stroke-width="3.5" stroke-linecap="round"></path>
        <path d="M103,137 Q111,145 120,137 Q129,145 137,137" stroke="#E4C193" stroke-width="4" stroke-linecap="round" fill="none"></path>
      </g>
      <g class="laugh-face">
        <path d="M74,90 Q88,76 102,90" stroke="#B65E14" stroke-width="5" stroke-linecap="round" fill="none"></path>
        <path d="M138,90 Q152,76 166,90" stroke="#CFA26B" stroke-width="5" stroke-linecap="round" fill="none"></path>
        <path d="M98,131 Q120,134 142,131 Q137,152 120,152 Q103,152 98,131 Z" fill="#45232F"></path>
        <path d="M109,145 C109,153 131,153 131,145 C131,140 109,140 109,145 Z" fill="#F4778F"></path>
      </g>
    </svg>
  </div>
</div>

<script>
  (function () {
    var el = document.getElementById('frida');
    var t;
    function laugh() {
      clearTimeout(t);
      el.classList.remove('laughing');
      // force reflow so the animation restarts on rapid taps
      void el.offsetWidth;
      el.classList.add('laughing');
      t = setTimeout(function () { el.classList.remove('laughing'); }, 1050);
    }
    el.addEventListener('click', laugh);
    el.addEventListener('keydown', function (e) { if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); laugh(); } });
  })();
</script>
</body>
</html>
